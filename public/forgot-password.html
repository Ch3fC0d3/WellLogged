<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Log Digitizing</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: var(--shadow); }
        .auth-form { display: flex; flex-direction: column; gap: 15px; }
        .auth-input { padding: 10px; border: 1px solid var(--line); border-radius: 4px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .auth-btn { background: var(--teal); color: #fff; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .auth-error { color: #ef4444; font-size: 14px; text-align: center; }
        .auth-success { color: var(--teal); font-size: 14px; text-align: center; font-weight: 500; }
        .text-center { text-align: center; }
        .link { color: var(--teal); text-decoration: underline; }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KLDD07ZC9X"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-KLDD07ZC9X');
</script>
</head>
<body style="background: var(--surface-soft); margin: 0;">
    <header class="site-header" style="position: relative; transform: none; left: 0; width: 100%; max-width: none; box-sizing: border-box; min-height: 60px; padding: 20px 30px; background: var(--ink); display: flex; justify-content: space-between; align-items: center;">
        <a class="brand" href="/" aria-label="Log Digitizing home" style="text-decoration: none;">
            <img src="/assets/logo.svg?v=2" alt="Log Digitizing AI Logo" class="brand-logo" style="height: 40px;" />
        </a>
        <nav class="nav-links" style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap;">
            <a href="/login.html" class="nav-link nav-login-btn" style="color: #fff; text-decoration: none; font-weight: bold; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;">Log In</a>
        </nav>
    </header>

    <div class="auth-container">
        <h2 class="text-center" style="margin-top:0;">Reset Password</h2>
        <p class="text-center" style="color:var(--muted); font-size:14px; margin-bottom:20px;">Enter your email address and we'll send you a link to reset your password.</p>
        <form id="forgotForm" class="auth-form">
            <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
            <div id="msg" class="auth-error"></div>
            <button type="submit" class="auth-btn">Send Reset Link</button>
        </form>
        <p class="text-center" style="margin-top: 20px; font-size:14px;">
            Remember your password? <a href="/login.html" class="link">Log In</a>
        </p>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msg = document.getElementById('msg');
            const btn = e.target.querySelector('button');
            
            msg.textContent = '';
            msg.className = 'auth-error';
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();
                
                if (res.ok) {
                    msg.className = 'auth-success';
                    msg.textContent = data.message || 'If an account exists, a reset link was sent.';
                    document.getElementById('email').value = '';
                } else {
                    msg.textContent = data.error || 'Failed to send reset link';
                }
            } catch (err) {
                msg.textContent = 'Server error. Try again later.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
