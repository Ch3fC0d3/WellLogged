<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Log Digitizing</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: var(--shadow); }
        .auth-form { display: flex; flex-direction: column; gap: 15px; }
        .auth-input { padding: 10px; border: 1px solid var(--line); border-radius: 4px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .auth-btn { background: var(--teal); color: #fff; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .auth-error { color: red; font-size: 14px; text-align: center; }
        .text-center { text-align: center; }
        .link { color: var(--teal); text-decoration: underline; }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; display: flex; align-items: center; }
        .password-toggle:hover { color: var(--teal); }
        .password-wrapper .auth-input { padding-right: 44px; }
    </style>
</head>
<body style="background: var(--surface-soft); margin: 0;">
    <header class="site-header" style="position: relative; transform: none; left: 0; width: 100%; max-width: none; box-sizing: border-box; min-height: 60px; padding: 20px 30px; background: var(--ink); display: flex; justify-content: space-between; align-items: center;">
        <a class="brand" href="/" aria-label="Log Digitizing home" style="text-decoration: none;">
            <img src="/assets/logo.svg" alt="Log Digitizing AI Logo" class="brand-logo" style="height: 40px;" />
        </a>
        <nav class="nav-links" style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap;">
            <a href="/#why" style="color: #fff; text-decoration: none; font-weight: 500; font-size: 14px;">Why Log Digitizing</a>
            <a href="/#process" style="color: #fff; text-decoration: none; font-weight: 500; font-size: 14px;">How it works</a>
            <a href="/#pricing" style="color: #fff; text-decoration: none; font-weight: 500; font-size: 14px;">Pricing</a>
            <a href="/login.html" class="nav-link nav-login-btn" style="color: #fff; text-decoration: none; font-weight: bold; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;">Log In</a>
        </nav>
    </header>

    <div class="auth-container">
        <h2 class="text-center">Log In</h2>
        <form id="loginForm" class="auth-form">
            <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
            <div class="password-wrapper">
                <input type="password" id="password" class="auth-input" placeholder="Password" required>
                <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">
                    <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
            <div id="errorMsg" class="auth-error"></div>
            <button type="submit" class="auth-btn">Log In</button>
        </form>
        <p class="text-center" style="margin-top: 20px;">
            Don't have an account? <a href="/signup.html" class="link">Sign Up</a>
        </p>
    </div>

    <script>
        // Check if already logged in (append timestamp to completely bust aggressive browser caching)
        fetch('/api/auth/me?t=' + Date.now()).then(res => {
            if (res.ok) {
                window.location.href = '/dashboard';
            }
        });

        document.getElementById('togglePassword').addEventListener('click', () => {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                pwd.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = '';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (res.ok) {
                    window.location.href = '/dashboard';
                } else {
                    const data = await res.json();
                    errorMsg.textContent = data.error || 'Login failed';
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Try again later.';
            }
        });
    </script>
</body>
</html>
