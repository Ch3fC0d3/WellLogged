<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password | Log Digitizing</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: var(--shadow); }
        .auth-form { display: flex; flex-direction: column; gap: 15px; }
        .auth-input { padding: 10px; border: 1px solid var(--line); border-radius: 4px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .auth-btn { background: var(--teal); color: #fff; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .auth-error { color: #ef4444; font-size: 14px; text-align: center; }
        .auth-success { color: var(--teal); font-size: 14px; text-align: center; font-weight: 500; }
        .text-center { text-align: center; }
        .link { color: var(--teal); text-decoration: underline; }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; display: flex; align-items: center; }
        .password-toggle:hover { color: var(--teal); }
        .password-wrapper .auth-input { padding-right: 44px; }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KLDD07ZC9X"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-KLDD07ZC9X');
</script>
</head>
<body style="background: var(--surface-soft); margin: 0;">
    <header class="site-header" style="position: relative; transform: none; left: 0; width: 100%; max-width: none; box-sizing: border-box; min-height: 60px; padding: 20px 30px; background: var(--ink); display: flex; justify-content: space-between; align-items: center;">
        <a class="brand" href="/" aria-label="Log Digitizing home" style="text-decoration: none;">
            <img src="/assets/logo.svg?v=2" alt="Log Digitizing AI Logo" class="brand-logo" style="height: 40px;" />
        </a>
        <nav class="nav-links" style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap;">
            <a href="/login.html" class="nav-link nav-login-btn" style="color: #fff; text-decoration: none; font-weight: bold; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;">Log In</a>
        </nav>
    </header>

    <div class="auth-container">
        <h2 class="text-center" style="margin-top:0;">Create New Password</h2>
        <p class="text-center" style="color:var(--muted); font-size:14px; margin-bottom:20px;">Enter your new password below.</p>
        <form id="resetForm" class="auth-form">
            <div class="password-wrapper">
                <input type="password" id="password" class="auth-input" placeholder="New Password" required minlength="6">
                <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">
                    <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
            <div id="msg" class="auth-error"></div>
            <button type="submit" class="auth-btn">Save New Password</button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('resetForm').innerHTML = '<p style="color:#ef4444;text-align:center;">Invalid password reset link. Please request a new one.</p><div style="text-align:center;margin-top:20px;"><a href="/forgot-password.html" class="btn">Go to Forgot Password</a></div>';
        }

        document.getElementById('togglePassword')?.addEventListener('click', () => {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                pwd.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        });

        document.getElementById('resetForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!token) return;

            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            const btn = e.target.querySelector('button[type="submit"]');
            
            msg.textContent = '';
            msg.className = 'auth-error';
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await res.json();
                
                if (res.ok) {
                    msg.className = 'auth-success';
                    msg.textContent = data.message || 'Password updated successfully.';
                    document.getElementById('password').value = '';
                    
                    // Show login link
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    msg.textContent = data.error || 'Failed to update password';
                }
            } catch (err) {
                msg.textContent = 'Server error. Try again later.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save New Password';
            }
        });
    </script>
</body>
</html>
