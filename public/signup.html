<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Well Logged</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: var(--shadow); }
        .auth-form { display: flex; flex-direction: column; gap: 15px; }
        .auth-input { padding: 10px; border: 1px solid var(--line); border-radius: 4px; font-size: 16px; }
        .auth-btn { background: var(--teal); color: #fff; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .auth-error { color: red; font-size: 14px; text-align: center; }
        .text-center { text-align: center; }
        .link { color: var(--teal); text-decoration: underline; }
    </style>
</head>
<body style="background: var(--surface-soft); margin: 0;">
    <header class="site-header" style="position: relative; transform: none; left: 0; width: 100%; max-width: none; box-sizing: border-box; min-height: 60px; padding: 20px 30px; background: var(--ink); display: flex; justify-content: space-between; align-items: center;">
        <a class="brand" href="/" aria-label="Well Logged home" style="text-decoration: none;">
            <img src="/assets/logo.svg" alt="Well Logged AI Logo" class="brand-logo" style="height: 40px;" />
        </a>
        <nav class="nav-links" style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap;">
            <a href="/#why" style="color: #fff; text-decoration: none; font-weight: 500; font-size: 14px;">Why Well Logged</a>
            <a href="/#process" style="color: #fff; text-decoration: none; font-weight: 500; font-size: 14px;">How it works</a>
            <a href="/#pricing" style="color: #fff; text-decoration: none; font-weight: 500; font-size: 14px;">Pricing</a>
            <a href="/login.html" class="nav-link nav-login-btn" style="color: #fff; text-decoration: none; font-weight: bold; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;">Log In</a>
        </nav>
    </header>

    <div class="auth-container">
        <h2 class="text-center">Create an Account</h2>
        <form id="signupForm" class="auth-form">
            <input type="text" id="name" class="auth-input" placeholder="Full Name" required>
            <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
            <input type="text" id="company" class="auth-input" placeholder="Company Name (optional)">
            <input type="text" id="address" class="auth-input" placeholder="Address (optional)">
            <input type="password" id="password" class="auth-input" placeholder="Password" required>
            <div id="errorMsg" class="auth-error"></div>
            <button type="submit" class="auth-btn">Sign Up</button>
        </form>
        <p class="text-center" style="margin-top: 20px;">
            Already have an account? <a href="/login.html" class="link">Log In</a>
        </p>
    </div>

    <script>
        // Check if already logged in (append timestamp to completely bust aggressive browser caching)
        fetch('/api/auth/me?t=' + Date.now()).then(res => {
            if (res.ok) {
                window.location.href = '/dashboard';
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const company = document.getElementById('company').value;
            const address = document.getElementById('address').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = '';

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, company, address, password })
                });

                if (res.ok) {
                    window.location.href = '/dashboard';
                } else {
                    const data = await res.json();
                    errorMsg.textContent = data.error || 'Signup failed';
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Try again later.';
            }
        });
    </script>
</body>
</html>
